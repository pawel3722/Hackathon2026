<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneypoly</title>
    <style>
        body { font-family: sans-serif; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; cursor: pointer; }
        .wrapper
        {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            border: 2px solid blue;
        }

        section
        {
            padding: 10px;
        }

        .half
        {
            width: 45%;
            display: inline-block;
            vertical-align: top;
        }
    </style>
</head>
<body>

    <div class="wrapper">    
        <header>
            <h1>Moneypoly</h1>
        </header>
        <section id="setup-section">
            <section>
                <h2>Your user name</h2>
                <input type="text" id="user-name" placeholder="User name">    
            </section>

            <section class="half">
                <h2>Create new game</h2>
                <button id="create-button" onclick="createGame()">Create Game</button>
            </section>
            <section class="half">
                <h2>Join existing game</h2>
                <input type="text" id="game-id" placeholder="Paste ID here">
                <button id="join-btn" onclick="joinGame()">Join Game</button>
            </section>
        </section>

        <section id="lobby-section" style="display:none;">
            <h2>Lobby <span id="lobby-id"></span></h2>
            <h3>Players in lobby:</h3>
            <ul id="user-list" style="text-align:left"></ul>
        </section>
    </div>
        
    <script>
        let socket = null;
        let user_id = null;

        // DOM Elements
        const joinBtn = document.getElementById('join-btn');
        const createBtn = document.getElementById('create-button');
        const gameIdInput = document.getElementById('game-id');
        const usernameInput = document.getElementById('user-name');

        const lobbyIdHeader = document.getElementById('lobby-id');

        const setupSection = document.getElementById('setup-section');
        const lobbySection = document.getElementById('lobby-section');
        const userList = document.getElementById('user-list');

        const createGame = async () => {
            fetch('/create', {
                method: 'POST'
            })
                .then((res) => {
                    if (!res.ok) throw new Error('Failed to create game');
                    return res.json().catch(() => null);
                })
                .then((data) => {
                    console.log('Game created:', data);
                    gameIdInput.value = data.lobby_id;

                    joinGame();
                })
                .catch((err) => {
                    alert(err.message);
                });

        }

        const joinGame = async () => {
            const gameId = gameIdInput?.value.trim();

            if (!gameId) {
                alert('Please enter a game ID.');
                return;
            }

            const username = usernameInput.value.trim();

            fetch(`/join/${encodeURIComponent(gameId)}?name=${username}`, {
                method: 'POST'
            })
                .then((res) => {
                    if (!res.ok) throw new Error('Failed to join game');
                    return res.json().catch(() => null);
                })
                .then((data) => {
                    console.log(`Join request sent for game ${gameId}`, data);

                    user_id = data.user_id;
                    lobbyIdHeader.textContent = gameId;

                    const wsUrl = `ws://${window.location.host}${data.ws}`;
                    createSocket(wsUrl, user_id);
                    lobbySection.style.display = 'block';
                    setupSection.style.display = 'none';
                })
                .catch((err) => {
                    alert(err.message);
                });
        }


        const createSocket = (url, uid) => {
            socket = new WebSocket(`${url}?user_id=${uid}`);
            
            socket.onopen = () => {
                console.log('Connected to game WebSocket');
            };
            
            socket.onmessage = (event) => {
                console.log('Message from server:', event.data);

                const msg = JSON.parse(event.data);

                if (msg.type === 'lobby_update') {
                    userList.innerHTML = '';
                    msg.users.forEach((user) => {
                        const li = document.createElement('li');
                        li.textContent = user.name;
                        userList.appendChild(li);
                    });
                }
            };
            
            socket.onerror = (error) => {
                console.error('WebSocket error:', error);
            };
            
            socket.onclose = () => {
                console.log('WebSocket connection closed');
            };
        }

    </script>
</body>
</html>
