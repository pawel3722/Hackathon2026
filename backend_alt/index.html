<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Sum Game</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #status-area, #game-area, #result-area, #waiting-submit { display: none; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; cursor: pointer; }
        #identity-text { color: #0066cc; }
    </style>
</head>
<body>

    <h1>The Sum Game</h1>
    
    <div id="join-area">
        <button id="join-btn">Join Game</button>
    </div>

    <div id="status-area">
        <h2 id="identity-text"></h2>
        <h3 id="status-text"></h3>
        <button id="start-btn" style="display: none; background-color: #28a745; color: white;">Start game</button>
    </div>
    
    <div id="game-area">
        <h3 id="game-header">Game Started!</h3>
        <p>Enter a number to add to the pool:</p>
        <input type="number" id="number-input" placeholder="e.g. 42">
        <button id="submit-btn">Submit Number</button>
    </div>

    <div id="waiting-submit">
        <h3>Number submitted!</h3>
        <p>Waiting for other players to submit their numbers...</p>
    </div>
    
    <div id="result-area">
        <h2>Game Over!</h2>
        <h3 id="result-text" style="color: green;"></h3>
    </div>

    <script>
        const socket = io();
        
        // DOM Elements
        const joinArea = document.getElementById('join-area');
        const joinBtn = document.getElementById('join-btn');
        const statusArea = document.getElementById('status-area');
        const identityText = document.getElementById('identity-text');
        const statusText = document.getElementById('status-text');
        const gameArea = document.getElementById('game-area');
        const waitingSubmit = document.getElementById('waiting-submit');
        const resultArea = document.getElementById('result-area');
        const resultText = document.getElementById('result-text');
        const numInput = document.getElementById('number-input');
        const submitBtn = document.getElementById('submit-btn');
        const startBtn = document.getElementById('start-btn');

        joinBtn.addEventListener('click', () => {
            socket.emit('join_game');
        });

        startBtn.addEventListener('click', () => {
            console.log('Start game button clicked');
            socket.emit('request_start_game');
        });

        submitBtn.addEventListener('click', () => {
            const val = numInput.value;
            if (val !== '') {
                socket.emit('submit_number', { number: val });
            }

            gameArea.style.display = 'none';
            waitingSubmit.style.display = 'block';
        });



        socket.on('assigned_id', (data) => {
            console.log(`Game join successful, id= ${data.player_id}`);

            joinArea.style.display = 'none';
            statusArea.style.display = 'block';

            identityText.innerText = `You are Player ${data.player_id}`;

            if (data.player_id === 1) {
                startBtn.style.display = 'inline-block';
            }
        });

        socket.on('player_count', (data) => {
            statusText.innerText = `Waiting for players... ${data.count} connected.`;
            statusText.style.display = 'block';
        });

        socket.on('game_start', () => {
            console.log("Game started!");

            numInput.value = ''; 

            statusArea.style.display = 'none';
            gameArea.style.display = 'block';
        });

        socket.on('game_result', (data) => {
            resultText.innerText = `The sum of everyone's numbers is: ${data.sum}`;

            waitingSubmit.style.display = 'none';
            resultArea.style.display = 'block';
        });

        socket.on('error', (data) => {
            alert(data.message);
        });
    </script>
</body>
</html>
